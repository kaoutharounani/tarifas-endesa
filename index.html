<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recomendador Endesa - Papernest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @font-face {
            font-family: 'Avenir';
            src: local('Avenir'), local('Avenir-Light');
        }
        #endesa-tool-container {
            font-family: 'Avenir', system-ui, -apple-system, sans-serif;
            background-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #E7E5E4; border-radius: 10px; }
        
        .tariff-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-transparent p-2">

<div id="endesa-tool-container" class="max-w-2xl mx-auto text-[#1C1917] antialiased">
    <div class="bg-white rounded-[24px] border border-[#E7E5E4] shadow-sm overflow-hidden">
        
        <div class="bg-[#FAFAF9] px-6 py-4 border-b border-[#E7E5E4] flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="https://d11o8pt3cttu38.cloudfront.net/wp-content/uploads/sites/27/2024/05/7ca8e53c-logo-endesa_108004i080026000016028.png" alt="Endesa" class="h-6">
                <span class="h-4 w-px bg-[#D6D3D1]"></span>
                <span class="text-[10px] font-bold text-[#79716B] uppercase tracking-widest">Asesor de Ahorro</span>
            </div>
        </div>

        <div class="p-6 md:p-8">
            <h1 class="text-xl font-bold mb-2 tracking-tight">Encuentra tu tarifa ideal</h1>
            <p class="text-[#57534D] text-sm mb-8 leading-relaxed">Selecciona tus preferencias para ver las ofertas personalizadas de Endesa.</p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-[#79716B]">Tipo de suministro</label>
                    <select id="supply-type" onchange="updateTariffOptions()" class="w-full bg-[#F6F5FF] border border-[#CECCFF] text-[#1B194D] text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#5A52FF] appearance-none cursor-pointer">
                        <option value="luz">Luz</option>
                        <option value="gas">Gas</option>
                        <option value="dual">Dual (Luz + Gas)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-[#79716B]">Preferencia de precio</label>
                    <select id="tariff-type" onchange="showRecommendations()" class="w-full bg-[#F6F5FF] border border-[#CECCFF] text-[#1B194D] text-sm py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#5A52FF] appearance-none cursor-pointer">
                        </select>
                </div>
            </div>

            <div id="results-container" class="space-y-4">
                </div>
        </div>
    </div>
</div>

<script>
    const OFFERS = [
        // LUZ
        { id: 1, supply: 'luz', type: 'fija', name: "Endesa Conecta Luz", desc: "Precio fijo 24h. Ideal para máxima tranquilidad.", url: "https://www.papernest.es/endesa/tarifas/conecta-luz/" },
        { id: 2, supply: 'luz', type: 'fija', name: "Endesa One Luz", desc: "Gestión 100% online con precio estable.", url: "https://www.papernest.es/endesa/tarifas/one-luz/" },
        { id: 3, supply: 'luz', type: 'variable', name: "Tarifa Happy", desc: "Tú eliges tus horas gratis de consumo eléctrico.", url: "https://www.papernest.es/endesa/tarifas/tarifa-happy/" },
        { id: 4, supply: 'luz', type: 'indexada', name: "Tarifa PVPC", desc: "Mercado regulado. Precio variable hora a hora.", url: "https://www.papernest.es/endesa/tarifas/tarifa-pvpc/" },
        
        // GAS
        { id: 5, supply: 'gas', type: 'fija', name: "Endesa Conecta Gas", desc: "La opción más sencilla para tu hogar.", url: "https://www.papernest.es/endesa/tarifas/conecta-gas/" },
        { id: 6, supply: 'gas', type: 'indexada', name: "Tarifa TUR Gas", desc: "Tarifa de Último Recurso regulada por el Gobierno.", url: "https://www.papernest.es/endesa/tarifas/tarifa-ultimo-recurso/" },
        
        // DUAL
        { id: 7, supply: 'dual', type: 'fija', name: "Tarifa Formidable", desc: "Ahorra unificando luz y gas con grandes descuentos.", url: "https://www.papernest.es/endesa/tarifas/formidable/" },
        { id: 8, supply: 'dual', type: 'fija', name: "Tarifa Única", desc: "Cuota fija mensual personalizada sin sorpresas.", url: "https://www.papernest.es/endesa/tarifas/tarifa-unica/" }
    ];

    function updateTariffOptions() {
        const supply = document.getElementById('supply-type').value;
        const tariffSelect = document.getElementById('tariff-type');
        
        let options = '';
        if (supply === 'luz') {
            options = `<option value="fija">Precio Fijo</option>
                       <option value="variable">Horas Gratis (Variable)</option>
                       <option value="indexada">Precio de Mercado (Indexada)</option>`;
        } else if (supply === 'gas') {
            options = `<option value="fija">Precio Fijo</option>
                       <option value="indexada">Tarifa Regulada TUR (Indexada)</option>`;
        } else {
            options = `<option value="fija">Paquetes Ahorro (Fijo)</option>`;
        }
        
        tariffSelect.innerHTML = options;
        showRecommendations();
    }

    function showRecommendations() {
        const supply = document.getElementById('supply-type').value;
        const type = document.getElementById('tariff-type').value;
        const container = document.getElementById('results-container');
        
        const filtered = OFFERS.filter(o => o.supply === supply && o.type === type);
        
        container.innerHTML = filtered.map(o => `
            <div class="tariff-card bg-[#FAFAF9] border border-[#E7E5E4] rounded-2xl p-5 hover:border-[#5A52FF] transition-all">
                <div class="flex items-start gap-4">
                    <div class="p-2 bg-white rounded-lg shadow-sm">
                        <i data-lucide="${supply === 'luz' ? 'zap' : supply === 'gas' ? 'flame' : 'layers'}" class="w-5 h-5 text-[#5A52FF]"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-[#1B194D]">${o.name}</h4>
                        <p class="text-sm text-[#57534D] mb-4">${o.desc}</p>
                        
                        <div class="flex flex-wrap gap-3">
                            <a href="${o.url}" target="_blank" class="flex-1 min-w-[140px] bg-[#5A52FF] hover:bg-[#443EC1] text-white text-xs font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                Ver condiciones
                            </a>
                            <a href="tel:919014228" class="flex-1 min-w-[140px] bg-white border border-[#CECCFF] text-[#5A52FF] hover:bg-[#F6F5FF] text-xs font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                <i data-lucide="phone" class="w-3.5 h-3.5"></i>
                                919 014 228
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        
        lucide.createIcons();
        sendResize();
        trackTool("filter_change_" + supply + "_" + type);
    }

    // Bridge de comunicación e Iframe Resize
    function trackTool(actionName) {
        window.parent.postMessage({
            'event': 'tool_interaction',
            'tool_name': 'endesa-comparator-pro', 
            'tool_action': actionName
        }, '*');
    }

    function sendResize() {
        window.parent.postMessage({
            type: 'papernest-tool-resize',
            height: document.body.scrollHeight
        }, '*');
    }

    window.onload = () => {
        updateTariffOptions();
        const observer = new ResizeObserver(sendResize);
        observer.observe(document.body);
    };
</script>

</body>
</html>
